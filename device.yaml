substitutions:
  device_name: "kellerfenster-vorratsraum"  # only lowercase, numbers, - and _ allowed!
  friendly_name: "Kellerfenster Vorratsraum"
  local_domain: ".fritz.box"


esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
  - ssid: !secret wifi_keller_ssid
    password: !secret wifi_keller_password

  domain: ".fritz.box"
  use_address: 192.168.178.136

  ap:
    ssid: "${device_name} AP"
    password: !secret hotspot_password

captive_portal:
    


number:
  - platform: template
    id: target_temperature
    name: "Zieltemperatur"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 16.0
    min_value: 5.0
    max_value: 25.0
    step: 0.5
    unit_of_measurement: "°C"
    mode: slider

  - platform: template
    id: target_humidity
    name: "Zielluftfeuchtigkeit"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 55.0
    min_value: 20.0
    max_value: 80.0
    step: 1.0
    unit_of_measurement: "%"
    mode: slider

  - platform: template
    id: temperature_hysteresis
    name: "Hysterese Temperatur"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 1.0
    min_value: 0.2
    max_value: 5.0
    step: 0.2
    unit_of_measurement: "K"
    mode: slider

  - platform: template
    id: humidity_hysteresis
    name: "Hysterese Feuchtigkeit"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 2.5
    min_value: 0.5
    max_value: 10.0
    step: 0.5
    unit_of_measurement: "%"
    mode: slider

  - platform: template
    id: minimum_time
    name: "Zeit zwischen Aktionen"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 10
    min_value: 0
    max_value: 60
    step: 1
    unit_of_measurement: "min"
    mode: slider

select:
  - platform: template
    id: operation_mode
    name: "Operation Mode"
    optimistic: true
    restore_value: true
    options:
      - humidity
      - temperature
      - time-based
      - manual
    initial_option: humidity

globals:
  # variables for minimum open/close time between actions
  - id: last_motion
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: delay_remaining_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # variables for display page and selected setting
  - id: display_page
    type: uint8_t
    restore_value: no
    initial_value: '0'
      # 0 = status page
      # 1 = settings page
  - id: selected_setting
    type: uint8_t
    restore_value: no
    initial_value: '0'
      #   | MODE: humidity         | MODE: temperature      | MODE: time-based       | MODE: manual           |
      # 0 | no setting selected    | no setting selected    | no setting selected    | no setting selected    |
      # 1 | operation_mode         | operation_mode         | operation_mode         | operation_mode         |
      # 2 | target_humidity        | target_temperature     | open time              | BACK                   |
      # 3 | humidity_hysteresis    | temperature_hysteresis | close time             |
      # 4 | target_humidity        | BACK                   |
      # 5 | target_temperature     | humidity_hysteresis    |
      # 6 | temperature_hysteresis | minimum_time           |
      # 7 | BACK                   |
  - id: last_user_input
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: manual_position
    type: uint8_t
    restore_value: true
    initial_value: '100'
    # for opening % in manual mode

script:
  - id: process_window_request
    mode: restart
    then:
      - lambda: |-
          const uint32_t minimum_time_ms =
              (uint32_t)(id(minimum_time).state * 60000.0f);
          const uint32_t elapsed = millis() - id(last_motion);
          if (elapsed < minimum_time_ms) {
            id(delay_remaining_ms) = minimum_time_ms - elapsed;
          } else {
            id(delay_remaining_ms) = 0;
          }
      - if:
          condition:
            lambda: 'return id(delay_remaining_ms) > 0;'
          then:
            - delay: !lambda "return id(delay_remaining_ms);"
      - if:
          condition:
            binary_sensor.is_on: window_request
          then:
            - cover.open: window
          else:
            - cover.close: window
  - id: display_updater
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(display_page) == 0;'
          then:
            - display.page.show: status_page
      - if:
          condition:
            lambda: |-
              return id(display_page) == 1 && id(operation_mode).current_option() == "humidity";
          then:
            - display.page.show: settings_humidity
      - if:
          condition:
            lambda: |-
              return id(display_page) == 1 && id(operation_mode).current_option() == "temperature";
          then:
            - display.page.show: settings_temperature
      - if:
          condition:
            lambda: |-
              return id(display_page) == 1 && id(operation_mode).current_option() == "manual";
          then:
            - display.page.show: settings_manual
      - component.update: my_display


binary_sensor:
  - platform: status
    name: "Status"

  - platform: gpio
    id: rotary_button
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    internal: true
    on_press:
      then:
        - lambda: |-
            id(last_user_input) = millis();
            if (id(display_page) == 0) {
              id(display_page) = 1;
              id(selected_setting) = 1;
            } else {
              id(selected_setting)++;
            }
        - script.execute: display_updater
        - if:
            condition:
              lambda: |-
                return id(operation_mode).current_option() == "humidity" && id(selected_setting) > 6 ||
                id(operation_mode).current_option() == "temperature" && id(selected_setting) > 6 ||
                id(operation_mode).current_option() == "time-based" && id(selected_setting) > 3 ||
                id(operation_mode).current_option() == "manual" && id(selected_setting) > 1;
            then:
              - lambda: |-
                  id(display_page) = 0;
                  id(selected_setting) = 0;
              - display.page.show: status_page
              - component.update: my_display

  - platform: template
    id: window_request
    name: "Fenster öffnen?"
    lambda: |-
      if (id(operation_mode).current_option() == "humidity") {
        // Humidity Control
        if (id(inside_humidity_state).state > 0)  // Too humid inside
          return id(outside_humidity_relation).state <= 0;
        if (id(inside_humidity_state).state < 0)  // Too dry inside
          return id(outside_humidity_relation).state >= 0;
        // Humidity OK -> Temperature Control
        if (id(inside_temperature_state).state > 0)  // Too warm inside
          return id(outside_temperature_relation).state <= 0; 
        if (id(inside_temperature_state).state < 0)  // Too cold inside
          return id(outside_temperature_relation).state >= 0;
        // Keep window closed
        return false;
      };
      if (id(operation_mode).current_option() == "temperature") {
        // Temperature Control
        if (id(inside_temperature_state).state > 0)  // Too warm inside
          return id(outside_temperature_relation).state <= 0; 
        if (id(inside_temperature_state).state < 0)  // Too cold inside
          return id(outside_temperature_relation).state >= 0;
        // Temperature OK -> Humidity Control
        if (id(inside_humidity_state).state > 0)  // Too humid inside
          return id(outside_humidity_relation).state <= 0;
        if (id(inside_humidity_state).state < 0)  // Too dry inside
          return id(outside_humidity_relation).state >= 0;
        // Keep window closed
        return false;
      }
      return false;
    on_press:
      - script.execute: process_window_request
    on_release:
      - script.execute: process_window_request

  - platform: template
    id: humidity_high
    name: "Luftfeuchte überschritten"
    lambda: |-
      return id(inside_humidity_state).state > 0;
    device_class: problem

  - platform: template
    id: temperature_high
    name: "Temperatur überschritten"
    lambda: |-
      return id(inside_temperature_state).state > 0;
    device_class: problem


i2c:
  - id: i2c_inside  # indoor sensor + Display
    sda: GPIO21
    scl: GPIO19
    scan: true
  - id: i2c_outside  # outdoor sensor (separate bus, when sensors having the same id)
    sda: GPIO23
    scl: GPIO22
    scan: true

sensor:
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
    icon: mdi:wifi

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal %"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""
    icon: mdi:wifi

  - platform: aht10
    i2c_id: i2c_inside
    variant: AHT20
    temperature:
      name: "Innentemperatur"
      id: inside_temperature
      device_class: temperature
      state_class: measurement
      accuracy_decimals: 1
    humidity:
      name: "Innenluftfeuchtigkeit"
      id: inside_humidity
      device_class: humidity
      state_class: measurement
      accuracy_decimals: 1
    update_interval: 30s

  - platform: aht10
    i2c_id: i2c_outside
    variant: AHT20
    temperature:
      name: "Außentemperatur"
      id: outside_temperature
      device_class: temperature
      state_class: measurement
      accuracy_decimals: 1
    humidity:
      name: "Außenluftfeuchtigkeit"
      id: outside_humidity
      device_class: humidity
      state_class: measurement
      accuracy_decimals: 1
    update_interval: 30s

  - platform: rotary_encoder
    id: rotary_encoder_1
    pin_a:
      number: GPIO16
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO17
      mode:
        input: true
        pullup: true
    resolution: 1
    restore_mode: ALWAYS_ZERO
    internal: true
    on_clockwise:
      then:
        - lambda: |-
            id(last_user_input) = millis();
            if (id(selected_setting) == 1) {  // special handling to prevent multiple execution
              auto call = id(operation_mode).make_call();
              call.select_next(true);
              call.perform();
              return;
            };
            if (id(operation_mode).current_option() == "humidity") {
              switch (id(selected_setting)) {
                case 0: {  // no setting selected
                  auto call = id(window).make_call();
                  call.set_command_open();  // override actual position
                  call.perform();
                  return;
                }
                // case 1 is mode selection, which is handled above
                case 2:
                  id(target_humidity).publish_state(id(target_humidity).state + 1.0);
                  break;
                case 3:
                  id(humidity_hysteresis).publish_state(id(humidity_hysteresis).state + 0.5);
                  break;
                case 4:
                  id(target_temperature).publish_state(id(target_temperature).state + 0.5);
                  break;
                case 5:
                  id(temperature_hysteresis).publish_state(id(temperature_hysteresis).state + 0.2);
                  break;
                case 6:
                  id(minimum_time).publish_state(id(minimum_time).state + 1);
                  break;
                };
              return;
            };
            if (id(operation_mode).current_option() == "temperature") {
              switch (id(selected_setting)) {
                case 0: {  // no setting selected
                  auto call = id(window).make_call();
                  call.set_command_open();  // override actual position
                  call.perform();
                  return;
                }
                // case 1 is mode selection, which is handled above
                case 2:
                  id(target_temperature).publish_state(id(target_temperature).state + 0.5);
                  break;
                case 3:
                  id(temperature_hysteresis).publish_state(id(temperature_hysteresis).state + 0.2);
                  break;
                case 4:
                  id(target_humidity).publish_state(id(target_humidity).state + 1.0);
                  break;
                case 5:
                  id(humidity_hysteresis).publish_state(id(humidity_hysteresis).state + 0.5);
                  break;
                case 6:
                  id(minimum_time).publish_state(id(minimum_time).state + 1);
                  break;
                };
              return;
            };
            if (id(operation_mode).current_option() == "manual") {
              id(manual_position) = min(id(manual_position) + 10, 100);
              auto call = id(window).make_call();
              call.set_position(id(manual_position) / 100.0f);
              call.perform();
              ESP_LOGD("Position", "Set to %i", id(manual_position));
              return;
              // no switch case for settings in manual mode
            }
        - script.execute: display_updater
    on_anticlockwise:
      then:
        - lambda: |-
            id(last_user_input) = millis();
            if (id(selected_setting) == 1) {  // special handling to prevent multiple execution
              auto call = id(operation_mode).make_call();
              call.select_previous(true);
              call.perform();
              return;
            };
            if (id(operation_mode).current_option() == "humidity") {
              switch (id(selected_setting)) {
                case 0: {  // no setting selected
                  auto call = id(window).make_call();
                  call.set_command_close();  // override actual position
                  call.perform();
                  return;
                }
                // case 1 is mode selection, which is handled above
                case 2:
                  id(target_humidity).publish_state(id(target_humidity).state - 1.0);
                  break;
                case 3:
                  id(humidity_hysteresis).publish_state(id(humidity_hysteresis).state - 0.5);
                  break;
                case 4:
                  id(target_temperature).publish_state(id(target_temperature).state - 0.5);
                  break;
                case 5:
                  id(temperature_hysteresis).publish_state(id(temperature_hysteresis).state - 0.2);
                  break;
                case 6:
                  id(minimum_time).publish_state(id(minimum_time).state - 1);
                  break;
                };
              return;
            };
            if (id(operation_mode).current_option() == "temperature") {
              switch (id(selected_setting)) {
                case 0: {  // no setting selected
                  auto call = id(window).make_call();
                  call.set_command_close();  // override actual position
                  call.perform();
                  return;
                }
                // case 1 is mode selection, which is handled above
                case 2:
                  id(target_temperature).publish_state(id(target_temperature).state - 0.5);
                  break;
                case 3:
                  id(temperature_hysteresis).publish_state(id(temperature_hysteresis).state - 0.2);
                  break;
                case 4:
                  id(target_humidity).publish_state(id(target_humidity).state - 1.0);
                  break;
                case 5:
                  id(humidity_hysteresis).publish_state(id(humidity_hysteresis).state - 0.5);
                  break;
                case 6:
                  id(minimum_time).publish_state(id(minimum_time).state - 1);
                  break;
                };
              return;
            };
            if (id(operation_mode).current_option() == "manual") {
              id(manual_position) = max(id(manual_position) - 10, 0);
              auto call = id(window).make_call();
              call.set_position(id(manual_position) / 100.0f);
              call.perform();
              ESP_LOGD("Position", "Set to %i", id(manual_position));
              return;
              // no switch case for settings in manual mode
            }
        - script.execute: display_updater

  - platform: template
    id: inside_temperature_state
    internal: true
    lambda: |-
      const float t = id(inside_temperature).state;
      const float target = id(target_temperature).state;
      const float h = id(temperature_hysteresis).state / 2.0f;
      if (t >= target + h)
        return 1;  // above target temperature
      if (t <= target - h)
        return -1; // below target temperature
      return 0;    // within target range
    update_interval: 10s

  - platform: template
    id: inside_humidity_state
    internal: true
    lambda: |-
      const float h = id(inside_humidity).state;
      const float target = id(target_humidity).state;
      const float hyst = id(humidity_hysteresis).state / 2.0f;
      if (h >= target + hyst)
        return 1;  // above target humidity
      if (h <= target - hyst)
        return -1; // below target humidity
      return 0;    // within target range
    update_interval: 10s

  - platform: template
    id: outside_temperature_relation
    internal: true
    lambda: |-
      const float h = id(temperature_hysteresis).state / 2.0f;
      if (id(outside_temperature).state >= id(inside_temperature).state + h)
        return 1;  // outside temperature is above inside temperature
      if (id(outside_temperature).state <= id(inside_temperature).state - h)
        return -1; // outside temperature is below inside temperature
      return 0;    // outside temperature is within the hysteresis range
    update_interval: 5s

  - platform: template
    id: outside_humidity_relation
    internal: true
    lambda: |-
      const float h = id(humidity_hysteresis).state / 2.0f;
      if (id(outside_humidity).state >= id(inside_humidity).state + h)
        return 1;  // outside humidity is above inside humidity
      if (id(outside_humidity).state <= id(inside_humidity).state - h)
        return -1; // outside humidity is below inside humidity
      return 0;    // outside humidity is within the hysteresis range
    update_interval: 5s


switch:
  - platform: gpio
    id: relay_open
    pin:
      number: GPIO32  # On-Board Relay 1
      inverted: false
    restore_mode: ALWAYS_OFF
    internal: true
    on_turn_on:
      - switch.turn_off: relay_close

  - platform: gpio
    id: relay_close
    pin:
      number: GPIO33  # On-Board Relay 2
      inverted: false
    restore_mode: ALWAYS_OFF
    internal: true
    on_turn_on:
      - switch.turn_off: relay_open


cover:
  - platform: time_based
    id: window
    name: "Kellerfenster"
    device_class: window

    open_action:
      - switch.turn_off: relay_close
      - switch.turn_on: relay_open
      - lambda: |-
          id(last_motion) = millis();

    open_duration: 10s

    close_action:
      - switch.turn_off: relay_open
      - switch.turn_on: relay_close
      - lambda: |-
          id(last_motion) = millis();

    close_duration: 10s

    stop_action:
      - switch.turn_off: relay_open
      - switch.turn_off: relay_close


font:
  - file: "gfonts://Roboto"
    id: font_text
    size: 14
    glyphs: 
      - "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZäöüÄÖÜß"
      - ".,:;!?%°+-±*/=()[]{}<>|_@#$&\"'\\ "

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_icons
    size: 16
    glyphs:  # IMPORTANT: Codepoints are from MDI version 7.4.47
      - "\U000F0F9C" # mdi:home-import-outline
      - "\U000F0F9B" # mdi:home-export-outline
      - "\U000F1A7F" # mdi:thermometer-check
      - "\U000F1504" # mdi:water-check
      - "\U000F13AB" # mdi:timer
      - "\U000F17C6" # mdi:water-sync / mode: humidity
      - "\U000F1B0F" # mdi:thermometer-auto / mode: temperature
      - "\U000F0954" # mdi:clock / mode: time-based
      - "\U000F0B14" # mdi:alpha-m-box / mode: manual
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: big_icons
    size: 26
    glyphs:  # IMPORTANT: Codepoints are from MDI version 7.4.47
      - "\U000F0E04" # mdi:thermometer-minus
      - "\U000F0E05" # mdi:thermometer-plus
      - "\U000F1A7F" # mdi:thermometer-check
      - "\U000F1B0F" # mdi:thermometer-auto / mode: temperature
      - "\U000F1506" # mdi:water-minus
      - "\U000F150A" # mdi:water-plus
      - "\U000F1504" # mdi:water-check
      - "\U000F17C6" # mdi:water-sync / mode: humidity
      - "\U000F0954" # mdi:clock / mode: time-based
      - "\U000F0B14" # mdi:alpha-m-box / mode: manual

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    i2c_id: i2c_inside
    address: 0x3C
    update_interval: 1s
    id: my_display

    pages:
      - id: status_page
        lambda: |-
          // Line 1 - inside measurements
          it.printf(0, 0, id(font_icons), "\U000F0F9C");   // mdi:home-import-outline
          it.printf(22, 0, id(font_text), "%.1f°C / %.1f%%",
                    id(inside_temperature).state,
                    id(inside_humidity).state);
          // Line 2 - outside measurements
          it.printf(0, 16, id(font_icons), "\U000F0F9B");   // mdi:home-export-outline
          it.printf(22, 16, id(font_text), "%.1f°C / %.1f%%",
                    id(outside_temperature).state,
                    id(outside_humidity).state);
          // Line 3 - mode and status
          const char *mode_icon = "?";  // theoretical not possible
          if (id(operation_mode).current_option() ==  "humidity") {
            mode_icon = "\U000F17C6";  // mdi:water-sync
          } else if (id(operation_mode).current_option() ==  "temperature") {
            mode_icon = "\U000F1B0F";  // mdi:thermometer-auto
          } else if (id(operation_mode).current_option() == "time-based") {
              mode_icon = "\U000F0954";  // mdi:clock
          } else if (id(operation_mode).current_option() == "manual") {
              mode_icon = "\U000F0B14";  // mdi:alpha-m-box
          }
          it.printf(0, 44, id(font_text), "Mode:");
          it.printf(40, 40, id(big_icons), "%s", mode_icon);
          it.line(0, 36, 128, 36);
          it.line(68, 36, 68, 64);
          const char *temp_icon;
          switch ((int) id(inside_temperature_state).state) {
            case -1:
              temp_icon = "\U000F0E04";   // mdi:thermometer-minus
              break;
            case 1:
              temp_icon = "\U000F0E05";   // mdi:thermometer-plus
              break;
            default:
              temp_icon = "\U000F1A7F";   // mdi:thermometer-check
              break;
          }
          const char *humid_icon;
          switch ((int) id(inside_humidity_state).state) {
            case -1:
              humid_icon = "\U000F1506";  // mdi:water-minus
              break;
            case 1:
              humid_icon = "\U000F150A";  // mdi:water-plus
              break;
            default:
              humid_icon = "\U000F1504";  // mdi:water-check
              break;
          }
          if (id(operation_mode).current_option() ==  "humidity") {
            it.printf(72, 40, id(big_icons), "%s", humid_icon);
            it.printf(100, 40, id(big_icons), "%s", temp_icon);
          } else if (id(operation_mode).current_option() ==  "temperature") {
            it.printf(76, 40, id(big_icons), "%s", temp_icon);
            it.printf(100, 40, id(big_icons), "%s", humid_icon);
          } else if (id(operation_mode).current_option() == "time-based") {
              // TODO: more to come
          } else if (id(operation_mode).current_option() == "manual") {
              it.printf(80, 44, id(font_text), "%.0f %%",
                        id(window).position*100);
          }

      - id: settings_humidity
        lambda: |-
          // Line 1 - Mode settings
          const char *mode_icon = "\U000F17C6";  // mdi:water-sync
          it.printf(0, 0, id(font_text), "Mode:");
          if (id(selected_setting) == 1) {  // mode
            it.filled_rectangle(45, 0, 23, 16);
            it.printf(48, 0, id(font_icons), Color::BLACK, "%s", mode_icon);
