# Reset the Display to the status page after 10 seconds of inactivity on the settings page
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              return id(display_page) == 1 &&
              millis() - id(last_user_input) > 10000;
          then:
            - lambda: |-
                id(display_page) = 0;
                id(selected_setting) = 0;
            - display.page.show: status_page
            - component.update: my_display

